<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scoutPurple: '#7413dc',
                        scoutLightPurple: '#f3e8ff',
                        scoutDarkPurple: '#5c0fa3',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Hero Section with Images -->
    <div class="relative overflow-hidden flex-grow">
        <div class="absolute inset-0 bg-gradient-to-br from-scoutLightPurple/50 to-slate-100"></div>
        
        <!-- Background Images -->
        <div class="absolute inset-0 opacity-10">
            <img src="https://ichef.bbci.co.uk/ace/standard/871/cpsprodpb/5094/live/821940e0-0042-11f0-982a-afa50108dc2a.jpg" alt="Scouts" class="w-full h-full object-cover">
        </div>
        
        <div class="relative max-w-4xl mx-auto px-4 py-16 md:py-24">
            <div class="text-left">
                <div class="bg-scoutLightPurple text-scoutPurple p-6 rounded-full w-24 h-24 flex items-center justify-center mb-6">
                    <i class="fas fa-exclamation-triangle text-4xl"></i>
                </div>
                
                <h1 class="text-7xl md:text-8xl font-bold text-slate-900 mb-2">404</h1>
                <h2 class="text-3xl font-semibold text-slate-700 mb-4">Page Not Found</h2>
                <p class="text-slate-500 text-lg mb-8">Sorry, the page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
                
                <a href="/" class="inline-flex items-center space-x-2 bg-scoutPurple hover:bg-scoutDarkPurple text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:shadow-xl transition transform active:scale-[0.99] text-lg">
                    <i class="fas fa-home"></i>
                    <span>Back to Home</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-100 border-t border-slate-200 mt-auto py-6 text-center text-sm text-slate-500">
        <p>&copy; 2026 Kandersteg 2027 Fundraiser Car Wash. All rights reserved.</p>
        <p class="mt-2">Website designed by <a href="https://jamesstudio.pages.dev" target="_blank" class="text-scoutPurple hover:text-scoutDarkPurple underline">James Theakston</a></p>
    </footer>

</body>
</html>
